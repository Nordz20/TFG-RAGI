version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ragi_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend:
    build: ./scripts
    container_name: ragi_backend
    depends_on:
      - elasticsearch
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - ES_HOST=http://elasticsearch:9200

  frontend:
    build: ./frontend
    container_name: ragi_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  es_data: